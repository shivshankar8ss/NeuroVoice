<!DOCTYPE html>
<html>
<head>
    <title>Empathy Engine</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:12px;
            width:500px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            margin-bottom:20px;
            color:#333;
        }

        textarea{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            resize:none;
            font-size:14px;
        }

        button{
            margin-top:15px;
            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#667eea;
            color:white;
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#5a67d8;
        }

        .result{
            margin-top:25px;
            padding:15px;
            background:#f4f4f4;
            border-radius:8px;
        }

        audio{
            margin-top:10px;
        }

        .footer{
            margin-top:20px;
            font-size:13px;
            color:#777;
        }

    </style>
</head>

<body>

<div class="container">

<h1>Empathy Engine</h1>

<form action="/process" method="post">

<textarea name="text" rows="4" placeholder="Enter text here"></textarea>

<br>

<button type="submit">Generate Speech</button>

</form>

{% if emotion %}

<div class="result">

<h3>Detected Emotion: {{ emotion }}</h3>
<h3>Confidence: {{ confidence }}</h3>

<audio controls>
    <source src="/{{ audio_file }}" type="audio/wav">
</audio>

</div>

{% endif %}

<div class="footer">
Developed by <strong>Shivshankar</strong>
</div>

</div>

</body>
</html>
